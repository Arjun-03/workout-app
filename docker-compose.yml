services:
  db:
    image: postgres:16
    container_name: workout-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: workout
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: workout
    ports:
      - "5432:5432"
    volumes:
      - workout-db-data:/var/lib/postgresql/data

volumes:
  workout-db-data: